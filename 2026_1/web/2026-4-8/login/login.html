<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>应用盒子 - 登录页面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
        }

        .login-main-box {
            display: flex;
            height: 100vh;
        }

        .left {
            flex: 2;
            background: url("../img/yzljc_top_owner_bar.png") no-repeat center;
            background-size: cover;
        }

        .right {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f8fafc;
        }

        .login-box {
            width: 100%;
            max-width: 420px;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.12);
            padding: 30px;
        }

        .login-title {
            text-align: center;
            color: #069c70;
            margin-bottom: 20px;
        }

        .login-body label {
            display: block;
            font-size: 14px;
            margin-bottom: 6px;
        }

        .login-body input {
            width: 100%;
            height: 46px;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
            padding: 0 14px;
            margin-bottom: 14px;
        }

        .login-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            font-size: 13px;
        }

        .login-options label {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .login-options a {
            color: #069c70;
            text-decoration: none;
        }

        .login-button {
            width: 100%;
            height: 46px;
            background: #069c70;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 10px;
        }

        .register {
            text-align: center;
            font-size: 13px;
        }

        .register a {
            color: #069c70;
            text-decoration: none;
        }
    </style>
</head>

<body>

<div class="login-main-box">

    <div class="left"></div>

    <div class="right">
        <div class="login-box">

            <div class="login-title">
                <h2>用户登录</h2>
            </div>

            <div class="login-body">

                <label>用户名</label>
                <input type="text" placeholder="在此处输入用户名">

                <label>密码</label>
                <input type="password" placeholder="在此处输入密码">

                <div class="login-options">
                    <label>
                        <input type="checkbox" style="width: 15px;margin-top: 15px;"> 记住密码
                    </label>
                    <a href="https://yzljc.top">忘记密码</a>
                </div>

                <button class="login-button">登录</button>

                <div class="register">
                    还没有账号？<a href="https://yzljc.top">立即注册</a>
                </div>

            </div>
        </div>
    </div>

</div>

</body>
</html>
